<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Eventra Calendar</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f9fafb;
        color: #111827;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        text-align: center;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .logo { width: 56px; height: 56px; margin: 0 auto 16px; display: block; }
      h1 { font-size: 18px; margin: 0 0 8px; }
      p { font-size: 14px; color: #6b7280; margin: 0 0 20px; line-height: 1.5; }
      button {
        height: 40px;
        padding: 0 18px;
        border-radius: 10px;
        border: none;
        background: #4f46e5;
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/favicon.svg" alt="Eventra" />
      <h1>You're offline</h1>
      <p>Eventra Calendar needs a connection to load fresh data. Your installed app will pick up where it left off once you're back online.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
